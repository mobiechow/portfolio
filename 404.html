<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Mobie Chow — Brand designer for NGOs and social enterprises in Hong Kong.">
  <title>404 — Page Not Found | Mobie Chow</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@700;800;900&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <main style="margin-left: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 2rem;">
    <div style="text-align: center; max-width: 500px;">
      <div style="font-family: 'Bricolage Grotesque', sans-serif; font-size: 8rem; font-weight: 900; color: var(--accent); line-height: 1; letter-spacing: -4px;">404</div>
      <div style="font-family: 'Bricolage Grotesque', sans-serif; font-size: 1.25rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--black); margin: 1rem 0 0.5rem;">Page not found</div>
      <p style="font-size: 0.9375rem; color: var(--text2); line-height: 1.7; margin-bottom: 2.5rem;">The page you're looking for doesn't exist or has been moved.</p>
      <a href="/" style="display: inline-block; background: var(--accent); color: white; font-family: 'Bricolage Grotesque', sans-serif; font-size: 0.8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; text-decoration: none; padding: 0.875rem 2rem; transition: background 0.2s ease;" onmouseover="this.style.background='#003DCC'" onmouseout="this.style.background='#0052FF'">← Back to Home</a>
    </div>
  </main>
  <script src="/page-transition.js" defer></script>
</body>
</html>
